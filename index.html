<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Cortês - Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0a0a0a; 
            --pref-verde: #00A859; 
            --pref-azul: #0072BB;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            background: radial-gradient(circle at top right, #1a2e23, #0a0a0a);
            color: white; font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* EFEITO VIDRO (Glassmorphism) */
        .app-container { 
            width: 360px; height: 640px; 
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px; padding: 25px; display: flex; flex-direction: column; 
            position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
        }

        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
        .active { display: flex !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Logos Maiores */
        .header-logos { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; padding-top: 10px; }
        .brasao { height: 85px; width: auto; }
        .logo-cortes { height: 90px; width: auto; filter: drop-shadow(0px 0px 8px rgba(255,255,255,0.3)); }

        .info-horarios {
            background: rgba(0, 168, 89, 0.15);
            border: 1px solid rgba(0, 168, 89, 0.3);
            padding: 12px; border-radius: 20px; margin-bottom: 20px; text-align: center;
        }

        input { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 16px; border-radius: 15px; color: white; width: 100%;
            outline: none; margin-bottom: 12px; transition: 0.3s;
        }
        input:focus { border-color: var(--pref-verde); background: rgba(255,255,255,0.1); }

        .btn-confirmar { 
            width: 100%; padding: 18px; border: none; border-radius: 18px; 
            background: var(--pref-azul); color: white; font-weight: 800;
            cursor: pointer; opacity: 0; transform: translateY(10px);
            transition: 0.4s; pointer-events: none;
        }
        .btn-confirmar.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .card-floating { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 22px; margin-bottom: 12px;
            cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .selected { background: var(--pref-verde) !important; box-shadow: 0 10px 20px rgba(0, 168, 89, 0.4); }

        #countdown { font-size: 35px; font-weight: 800; color: var(--pref-verde); text-shadow: 0 0 15px rgba(0,168,89,0.5); }

        #tela-ticket { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; 
            display:none; flex-direction:column; align-items:center; justify-content:center; padding: 25px;
        }
        .ticket-design { background: #fff; color: #000; width: 100%; border-radius: 30px; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="screen-login" class="screen">
            <div class="header-logos">
                <img src="brasao.png" class="brasao">
                <img src="logo-cortes.png" class="logo-cortes">
            </div>
            <h1 style="font-size: 22px; text-align: center; margin-bottom: 5px;">Conecta <span>Cortês</span></h1>
            <p style="opacity: 0.5; font-size: 12px; margin-bottom: 25px; text-align: center;">Portal do Estudante</p>
            
            <input type="number" id="l-cpf" placeholder="CPF">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn-confirmar show" style="background:var(--pref-verde)" onclick="fazerLogin()">ACESSAR</button>
            <button onclick="irPara('screen-register')" style="background:none; border:none; color:var(--pref-verde); margin-top:15px; cursor:pointer;">Criar conta</button>

            <div style="margin-top: auto; text-align: center;">
                <img src="onibus.png" style="width: 280px; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));">
            </div>
        </div>

        <div id="screen-main" class="screen">
            <div class="header-logos">
                <img src="brasao.png" class="brasao">
                <img src="logo-cortes.png" class="logo-cortes">
            </div>

            <div class="info-horarios">
                <p style="margin:0; font-size:10px; font-weight:800; letter-spacing:1px;">HORÁRIOS</p>
                <p style="margin:5px 0 0; font-size:13px;">📌 <b>Marcação:</b> 06h às 12h</p>
                <p style="margin:2px 0 0; font-size:13px;">🚌 <b>Saída:</b> 16:30h</p>
            </div>

            <div id="status-reserva" style="display:none; text-align:center;">
                <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:25px; border:1px solid var(--pref-verde); margin-bottom:20px;">
                    <p style="font-size:11px; opacity:0.7;">TICKET LIBERA EM:</p>
                    <div id="countdown">00:00:00</div>
                </div>
                <button id="btn-rever" class="btn-confirmar" style="background:var(--pref-azul)" onclick="calcularEVerTicket()">ABRIR TICKET</button>
            </div>

            <div id="area-reserva">
                <p style="text-align:center; opacity:0.6; margin-bottom:15px;">Para onde você vai hoje?</p>
                <div class="card-floating" id="opt-nassau" onclick="selecionarDestino('UNINASSAU')">
                    <span style="font-size:30px">🏫</span>
                    <strong style="margin-top:10px;">UNINASSAU</strong>
                </div>
                <div class="card-floating" id="opt-outras" onclick="selecionarDestino('OUTRAS')">
                    <span style="font-size:30px">🎓</span>
                    <strong style="margin-top:10px;">OUTRAS</strong>
                </div>
                <button class="btn-confirmar" id="btn-confirmar" onclick="salvarReserva()">CONFIRMAR VAGA</button>
            </div>

            <button onclick="firebase.auth().signOut()" style="margin-top: auto; color: #555; border: none; background: none; padding: 15px; cursor:pointer;">Sair da conta</button>
        </div>

        <div id="screen-register" class="screen">
            <h1 style="font-size: 20px;">Cadastro</h1>
            <input type="text" id="r-nome" placeholder="Nome Completo">
            <input type="text" id="r-apelido" placeholder="Apelido">
            <input type="number" id="r-cpf" placeholder="CPF">
            <input type="password" id="r-senha" placeholder="Senha">
            <button class="btn-confirmar show" style="background:var(--pref-verde)" onclick="criarConta()">CADASTRAR</button>
            <button onclick="irPara('screen-login')" style="background:none; border:none; color:white; opacity:0.5; margin-top:20px;">Voltar</button>
        </div>

        <div id="tela-ticket">
            <div class="ticket-design">
                <p style="font-size:10px; color:#aaa; font-weight:800;">PREFEITURA DE CORTÊS</p>
                <h1 id="tk-posicao" style="font-size:70px; color:var(--pref-azul); margin:10px 0;">#000</h1>
                <div id="tk-nome" style="font-weight:800; border-top:1px dashed #ddd; padding-top:15px; text-transform:uppercase;"></div>
                <div id="tk-destino" style="background:#f4f4f4; padding:10px; border-radius:12px; margin:15px 0; font-size:14px;"></div>
                <p id="tk-obs" style="color:var(--pref-verde); font-weight:800; font-size:12px;"></p>
            </div>
            <button class="btn-confirmar show" onclick="document.getElementById('tela-ticket').style.display='none'" style="margin-top:20px; background:#fff; color:#000;">FECHAR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDG1x9M2T6wG_HG2MJ9w4dj2c8XOEsbIP4",
            authDomain: "conecta-cortes.firebaseapp.com",
            databaseURL: "https://conecta-cortes-default-rtdb.firebaseio.com",
            projectId: "conecta-cortes",
            storageBucket: "conecta-cortes.firebasestorage.app",
            messagingSenderId: "923397923591",
            appId: "1:923397923591:web:9eb4d4f7f2690c193e9ba2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let userLogado = null;
        let destinoSelecionado = "";

        function getDataHoje() { return new Date().toISOString().split('T')[0]; }

        function irPara(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('usuarios/' + user.uid).once('value').then(snap => {
                    userLogado = snap.val();
                    irPara('screen-main');
                    checarStatusEHora();
                });
            } else { irPara('screen-login'); }
        });

        function selecionarDestino(v) {
            destinoSelecionado = v;
            document.querySelectorAll('.card-floating').forEach(c => c.classList.remove('selected'));
            document.getElementById(v === 'UNINASSAU' ? 'opt-nassau' : 'opt-outras').classList.add('selected');
            document.getElementById('btn-confirmar').classList.add('show');
        }

        function atualizarTimer() {
            const agora = new Date();
            const meioDia = new Date();
            meioDia.setHours(12, 0, 0, 0);
            let diff = meioDia - agora;
            if (diff > 0) {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            } else {
                document.getElementById('countdown').innerText = "LIBERADO!";
                document.getElementById('btn-rever').classList.add('show');
            }
        }

        async function checarStatusEHora() {
            const hoje = getDataHoje();
            const snap = await db.ref('passageiros').once('value');
            let reservouHoje = false;
            
            snap.forEach(c => { 
                const p = c.val();
                if(p.cpf_completo === userLogado.cpf && p.data === hoje) reservouHoje = true; 
            });

            if(reservouHoje) {
                document.getElementById('area-reserva').style.display = 'none';
                document.getElementById('status-reserva').style.display = 'block';
                if(new Date().getHours() < 12) {
                    setInterval(atualizarTimer, 1000);
                    atualizarTimer();
                } else {
                    document.getElementById('countdown').innerText = "LIBERADO!";
                    document.getElementById('btn-rever').classList.add('show');
                }
            }
        }

        async function salvarReserva() {
            if(new Date().getHours() >= 12) return alert("As reservas encerram às 12h!");
            await db.ref('passageiros').push({
                nome_completo: userLogado.nome,
                cpf_completo: userLogado.cpf,
                destino: destinoSelecionado,
                timestamp: Date.now(),
                data: getDataHoje()
            });
            location.reload();
        }

        async function calcularEVerTicket() {
            if(new Date().getHours() < 12) return alert("Ticket disponível após as 12h!");
            const hoje = getDataHoje();
            const snap = await db.ref('passageiros').once('value');
            let todos = [];
            snap.forEach(c => { if(c.val().data === hoje) todos.push(c.val()); });
            todos.sort((a, b) => a.timestamp - b.timestamp);
            
            let meu = todos.find(p => p.cpf_completo === userLogado.cpf);
            let pos = 0; let obs = "";
            
            if(todos.length <= 44) {
                pos = todos.findIndex(p => p.cpf_completo === userLogado.cpf) + 1;
                obs = "ÔNIBUS ÚNICO";
            } else {
                let lista = todos.filter(p => p.destino === meu.destino);
                pos = lista.findIndex(p => p.cpf_completo === userLogado.cpf) + 1;
                obs = meu.destino === 'UNINASSAU' ? "ÔNIBUS 01 - NASSAU" : "ÔNIBUS 02 - OUTRAS";
            }
            
            document.getElementById('tk-posicao').innerText = "#" + String(pos).padStart(3, '0');
            document.getElementById('tk-nome').innerText = meu.nome_completo;
            document.getElementById('tk-destino').innerText = "DESTINO: " + meu.destino;
            document.getElementById('tk-obs').innerText = obs;
            document.getElementById('tela-ticket').style.display = 'flex';
        }

        async function criarConta() {
            const n = document.getElementById('r-nome').value;
            const c = document.getElementById('r-cpf').value;
            const s = document.getElementById('r-senha').value;
            try {
                const res = await auth.createUserWithEmailAndPassword(c + "@cortes.com", s);
                await db.ref('usuarios/' + res.user.uid).set({ nome: n, cpf: c });
            } catch(e) { alert("Erro ao cadastrar."); }
        }

        async function fazerLogin() {
            const c = document.getElementById('l-cpf').value;
            const s = document.getElementById('l-senha').value;
            try { await auth.signInWithEmailAndPassword(c + "@cortes.com", s); }
            catch(e) { alert("Dados incorretos."); }
        }
    </script>
</body>
</html>
